name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    env:
      COHERE_API_KEY: test-api-key
      DB_USERNAME: test
      DB_PASSWORD: test
      RABBITMQ_USERNAME: test
      RABBITMQ_PASSWORD: test
      MAVEN_OPTS: -Djdk.attach.allowAttachSelf=true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run tests
        run: ./mvnw --batch-mode test
