<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mercury — Snippets</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      min-height: 190px;
      background: #0d0b12;
      color: #d4c99a;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 12px;
    }
    .header {
      padding: 13px 16px;
      border-bottom: 1px solid #1c1912;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #c9a84c;
    }
    .body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 13px;
    }
    .field label {
      display: block;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #6e6758;
      margin-bottom: 5px;
    }
    input[type="text"] {
      width: 100%;
      background: #0a0910;
      border: 1px solid #1c1912;
      color: #d4c99a;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 11px;
      outline: none;
      border-radius: 2px;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #c9a84c; }
    button {
      width: 100%;
      padding: 9px 14px;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      background: transparent;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s;
    }
    button:hover { background: rgba(201,168,76,0.07); }
    .status {
      font-size: 10px;
      min-height: 14px;
      letter-spacing: 0.04em;
    }
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #121420;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-label { font-size: 9px; color: #6e6758; letter-spacing: 0.1em; text-transform: uppercase; }
    .footer-count { font-size: 13px; color: #c9a84c; font-weight: 600; }
  </style>
</head>
<body>
  <div class="header">Mercury — Knowledge Engine</div>
  <div class="body">
    <div class="field">
      <label for="userId">User ID</label>
      <input type="text" id="userId" placeholder="Paste your UUID here" spellcheck="false" />
    </div>
    <button id="saveBtn">Save User ID</button>
    <div class="status" id="status"></div>
  </div>
  <div class="footer">
    <span class="footer-label">Saved today</span>
    <span class="footer-count" id="count">0</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
