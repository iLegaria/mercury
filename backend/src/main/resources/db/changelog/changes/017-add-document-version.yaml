databaseChangeLog:
  - changeSet:
      id: 017-add-document-version
      author: ian
      changes:
        - addColumn:
            tableName: documents
            columns:
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
      rollback:
        - dropColumn:
            tableName: documents
            columnName: version
