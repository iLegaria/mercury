databaseChangeLog:
  - changeSet:
      id: 004-create-chunks-table
      author: ilegaria
      changes:
        - createTable:
            tableName: chunks
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: document_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: chunk_index
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: token_count
                  type: int
              - column:
                  name: metadata
                  type: jsonb
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: chunks
            baseColumnNames: document_id
            referencedTableName: documents
            referencedColumnNames: id
            constraintName: fk_chunks_document
            onDelete: CASCADE
        - createIndex:
            tableName: chunks
            indexName: idx_chunks_document_id
            columns:
              - column:
                  name: document_id
        - sql:
            sql: ALTER TABLE chunks ADD COLUMN embedding vector(1536);
        - sql:
            sql: CREATE INDEX idx_chunks_embedding ON chunks USING hnsw (embedding vector_cosine_ops);
      rollback:
        - dropTable:
            tableName: chunks