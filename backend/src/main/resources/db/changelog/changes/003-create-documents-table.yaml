databaseChangeLog:
  - changeSet:
      id: 003-create-documents-table
      author: ilegaria
      changes:
        - createTable:
            tableName: documents
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: source_type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: file_path
                  type: varchar(1000)
              - column:
                  name: status
                  type: varchar(30)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: documents
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_documents_user
            onDelete: CASCADE
        - createIndex:
            tableName: documents
            indexName: idx_documents_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: documents
            indexName: idx_documents_status
            columns:
              - column:
                  name: status
      rollback:
        - dropTable:
            tableName: documents