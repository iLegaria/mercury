databaseChangeLog:
  - changeSet:
      id: 015-create-document-contents-table
      author: ian
      changes:
        - createTable:
            tableName: document_contents
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: document_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: extracted_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: document_contents
            baseColumnNames: document_id
            referencedTableName: documents
            referencedColumnNames: id
            constraintName: fk_document_contents_document
            onDelete: CASCADE
        - sql:
            sql: >
              INSERT INTO document_contents (id, document_id, content, extracted_at)
              SELECT gen_random_uuid(), id, extracted_text, NOW()
              FROM documents
              WHERE extracted_text IS NOT NULL AND extracted_text != '';
        - dropColumn:
            tableName: documents
            columnName: extracted_text
      rollback:
        - addColumn:
            tableName: documents
            columns:
              - column:
                  name: extracted_text
                  type: TEXT
                  constraints:
                    nullable: true
        - sql:
            sql: >
              INSERT INTO documents (id)
              SELECT document_id FROM document_contents
              ON CONFLICT (id) DO UPDATE SET extracted_text = excluded.extracted_text;
        - dropTable:
            tableName: document_contents
